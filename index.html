<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mestahla Admin</title>
<style>
:root{
  /* Official Mestahla Carnival Brand Palette */
  --teal:#315B54;--forest:#18312D;
  --coral:#F47C6C;--coral-dk:#E0604F;
  --yellow:#F6C84C;--yellow-lt:#FEF6DC;
  --sky:#78C9D4;--sky-lt:#E3F5F8;
  --cream:#FFF7E8;
  --purple:#9B86D9;--purple-lt:#EDE9F8;--purple-dk:#7A68C4;
  --amber:#F6C84C;--amber-lt:#FEF6DC;
  /* Semantic aliases */
  --brand:var(--teal);--brand-dk:var(--forest);
  --brand-lt:#E4EDEB;--brand-xlt:#F0F5F4;
  --ink:#26312F;--ink-2:#4A6B63;--ink-3:#8AADA6;
  --card:#fff;--bg:var(--cream);--border:#D5E3E0;--sidebar-bg:var(--forest);
  --shadow:0 2px 12px rgba(24,49,45,.08);--shadow-lg:0 8px 40px rgba(24,49,45,.16);
  --radius:14px;--radius-sm:9px;
  --font:system-ui,-apple-system,"Segoe UI",sans-serif;
  --serif:Georgia,"Times New Roman",serif;
}
:root[data-theme="dark"]{
  --bg:#0E1E1B;--card:#162620;--sidebar-bg:#0A1713;--border:#1E3830;
  --ink:#D8EDE8;--ink-2:#6B9E95;--ink-3:#3D706A;
  --brand-lt:#1A3530;--brand-xlt:#122820;
  --shadow:0 2px 16px rgba(0,0,0,.4);--shadow-lg:0 8px 40px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:var(--ink);background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand)}
input::placeholder{color:var(--ink-3)}

/* ── LOGIN SCREEN ─────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--forest);z-index:200;padding:20px}
#login-screen.hidden{display:none}
.login-card{background:var(--card);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;gap:24px;align-items:center;border-top:4px solid var(--teal)}
.login-logo{width:220px}
.login-title{font-size:20px;font-weight:800;color:var(--ink);font-family:var(--serif);text-align:center}
.login-sub{font-size:13px;color:var(--ink-3);margin-top:-16px;text-align:center}
.login-fields{display:flex;flex-direction:column;gap:14px;width:100%}
.login-label{font-size:11px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
.login-input-wrap{position:relative}
.login-input-wrap input{padding-left:44px;font-size:15px}
.login-input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
.login-btn{width:100%;padding:15px;background:var(--coral);color:#fff;border-radius:12px;font-size:16px;font-weight:700;transition:background .15s}
.login-btn:hover{background:var(--coral-dk)}
.login-error{background:#FEE2E2;border:1.5px solid #FECACA;border-radius:9px;padding:12px 16px;color:#991B1B;font-size:13px;font-weight:500;text-align:center;display:none}
.login-error.visible{display:block}
.login-attempts{font-size:11px;color:var(--ink-3);text-align:center;margin-top:-10px}

/* ── ADMIN SHELL ─────────────────────────────────────────── */
#admin-shell{display:flex;height:100vh;overflow:hidden}
.admin-sidebar{width:220px;min-width:220px;background:var(--sidebar-bg);border-right:1.5px solid var(--border);display:flex;flex-direction:column;padding:0 0 16px}
.sb-head{padding:20px 18px;border-bottom:1.5px solid rgba(255,255,255,.08)}
.sb-logo{display:block;width:160px;margin-bottom:6px}
.sb-role{font-size:10px;color:var(--sky);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.sb-nav{flex:1;padding:10px 10px;overflow-y:auto}
.nav-section{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.35);padding:14px 10px 5px}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--radius-sm);color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.95)}
.nav-item.active{background:var(--coral);color:#fff}
.nav-item .ni{font-size:17px;width:20px;text-align:center}
.sb-foot{padding:0 10px}
.admin-user-row{display:flex;align-items:center;gap:10px;padding:12px 10px 0;border-top:1.5px solid rgba(255,255,255,.08)}
.admin-av{width:34px;height:34px;border-radius:50%;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.admin-user-info{flex:1;min-width:0}
.admin-user-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.9)}
.admin-user-role{font-size:10px;color:var(--sky)}
.logout-btn{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .15s}
.logout-btn:hover{background:var(--coral);color:#fff}

/* ── MAIN AREA ───────────────────────────────────────────── */
.admin-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.admin-topbar{background:var(--sidebar-bg);border-bottom:1.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-topbar-title{font-size:18px;font-weight:800;color:var(--ink);font-family:var(--serif)}
.admin-topbar-actions{display:flex;gap:10px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--brand-lt);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--brand);color:#fff}
.admin-content{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:24px}

/* ── STATS GRID ──────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border-left:4px solid var(--brand)}
.stat-value{font-size:28px;font-weight:800;color:var(--brand);font-variant-numeric:tabular-nums}
.stat-label{font-size:11px;color:var(--ink-3);margin-top:2px}
.stat-trend{font-size:11px;color:#16A34A;margin-top:6px;font-weight:600}

/* ── TABLE ───────────────────────────────────────────────── */
.table-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1.5px solid var(--border);gap:12px;flex-wrap:wrap}
.table-title{font-size:15px;font-weight:700;color:var(--ink)}
.table-toolbar-right{display:flex;gap:10px;align-items:center}
.search-input{padding:9px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);font-size:13px;width:200px}
.add-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;background:var(--brand);color:#fff;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
.add-btn:hover{background:var(--brand-dk)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:500px}
th{text-align:left;padding:11px 16px;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-3);background:var(--brand-xlt);border-bottom:1.5px solid var(--border);font-weight:700}
td{padding:12px 16px;font-size:13px;color:var(--ink-2);border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--brand-xlt)}
.cell-img{width:46px;height:38px;border-radius:8px;background:var(--brand-lt);display:flex;align-items:center;justify-content:center;font-size:18px}
.cell-bold{font-weight:700;color:var(--ink)}
.pill{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
.pill.active,.pill.published,.pill.free{background:#DCFCE7;color:#166534}
.pill.inactive,.pill.draft{background:#FEE2E2;color:#991B1B}
.pill.locked,.pill.waitlisted{background:var(--amber-lt);color:#92400E}
.pill.confirmed{background:var(--brand-lt);color:var(--brand)}
.pill.featured{background:#EDE9FE;color:#5B21B6}
.tbl-actions{display:flex;gap:6px}
.tbl-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.tbl-btn.edit{background:var(--brand-lt);color:var(--brand)}
.tbl-btn.edit:hover{background:var(--brand);color:#fff}
.tbl-btn.del{background:#FEE2E2;color:#991B1B}
.tbl-btn.del:hover{background:#991B1B;color:#fff}
.tbl-btn.toggle{background:var(--amber-lt);color:#92400E}
.tbl-btn.toggle:hover{background:var(--amber);color:#fff}
.empty-state{text-align:center;padding:40px;color:var(--ink-3)}
.empty-state div:first-child{font-size:36px;margin-bottom:10px}

/* ── MODAL ───────────────────────────────────────────────── */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
.backdrop.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:18px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1.5px solid var(--border)}
.modal-title{font-size:16px;font-weight:800;color:var(--ink);font-family:var(--serif)}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--brand-lt);color:var(--ink-2);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .15s}
.modal-close:hover{background:var(--brand);color:#fff}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:15px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:11px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px}
.modal-foot{padding:16px 24px;border-top:1.5px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.btn-cancel{padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--ink-2);background:var(--brand-lt);cursor:pointer;transition:background .15s}
.btn-cancel:hover{background:var(--border)}
.btn-save{padding:10px 22px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:#fff;background:var(--brand);cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--brand-dk)}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;padding:12px 22px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:500;box-shadow:var(--shadow-lg);animation:toastIn .25s ease;white-space:nowrap}
.toast.hidden{display:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── CHARTS (CSS sparklines) ─────────────────────────────── */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:14px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px}
.bar{flex:1;background:var(--brand);border-radius:4px 4px 0 0;opacity:.85;min-height:4px;transition:opacity .15s;position:relative}
.bar:hover{opacity:1}
.bar-labels{display:flex;gap:6px;margin-top:6px}
.bar-label{flex:1;font-size:10px;color:var(--ink-3);text-align:center}

/* ── MOBILE SIDEBAR TOGGLE ───────────────────────────────── */
@media(max-width:768px){
  .admin-sidebar{display:none;position:fixed;inset:0 auto 0 0;z-index:100;width:200px}
  .admin-sidebar.open{display:flex}
  .menu-btn{display:flex}
}
.menu-btn{display:none;width:36px;height:36px;border-radius:50%;background:var(--brand-lt);align-items:center;justify-content:center;font-size:18px;cursor:pointer}
</style>
</head>

<script>
/* ── AUTH ─────────────────────────────────────────────────── */
const ADMIN_USER = 'Michael', ADMIN_PASS = 'Mestahla123';
let loginAttempts = 0;

function doLogin(){
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  const attEl = document.getElementById('login-attempts-left');
  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById('login-screen').classList.add('hidden');
    showToast('Welcome back, Michael! 👋');
    renderSection('dashboard');
  } else {
    loginAttempts++;
    err.classList.add('visible');
    err.textContent = loginAttempts>=3 ? `❌ ${5-loginAttempts} attempts remaining before lockout.` : '❌ Incorrect username or password.';
    attEl.textContent = `Attempt ${loginAttempts} of 5`;
    if(loginAttempts>=5){
      document.getElementById('login-username').disabled=true;
      document.getElementById('login-password').disabled=true;
      document.querySelector('.login-btn').disabled=true;
      err.textContent='🔒 Account locked. Contact your system administrator.';
    }
    document.getElementById('login-password').value='';
    document.getElementById('login-password').focus();
  }
}
function doLogout(){
  if(confirm('Sign out of the admin panel?')){
    document.getElementById('login-screen').classList.remove('hidden');
    loginAttempts=0;
    document.getElementById('login-username').value='';
    document.getElementById('login-password').value='';
    document.getElementById('login-error').classList.remove('visible');
    document.getElementById('login-attempts-left').textContent='';
    document.getElementById('login-username').disabled=false;
    document.getElementById('login-password').disabled=false;
    document.querySelector('.login-btn').disabled=false;
  }
}
function toggleTheme(){
  document.documentElement.dataset.theme = document.documentElement.dataset.theme==='dark'?'light':'dark';
}

          <input class="search-input" placeholder="🔍  Search users...">
        </div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Avatar</th><th>Name</th><th>Contact</th><th>Stage</th><th>Week</th><th>Subscription</th><th>Status</th><th>Joined</th></tr></thead>
        <tbody>${users.map(u=>`<tr>
          <td><div class="admin-av" style="width:32px;height:32px;font-size:11px;flex-shrink:0">${u.name.charAt(0)}</div></td>
          <td class="cell-bold">${u.name}</td>
          <td style="color:var(--ink-3);font-size:12px">${u.email}</td>
          <td>${u.stage}</td>
          <td>${u.week}</td>
          <td><span class="pill ${u.sub==='pro'?'featured':'inactive'}">${u.sub==='pro'?'Pro':'Free'}</span></td>
          <td><span class="pill ${u.status==='active'?'active':'inactive'}">${u.status}</span></td>
          <td style="color:var(--ink-3)">${u.joined}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}

/* ── TABLE FILTER ────────────────────────────────────────── */
function filterTable(input,tbodyId,attr){
  const q=input.value.toLowerCase();
  const tb=document.getElementById(tbodyId);
  if(!tb) return;
  tb.querySelectorAll('tr').forEach(row=>{
    const cell=row.querySelector('[data-'+attr+']');
    row.style.display=(!q||!cell||cell.dataset[attr]?.includes(q))?'':'none';
  });
}

/* ── MODAL ───────────────────────────────────────────────── */
function closeModal(){document.getElementById('modal').classList.add('hidden');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

/* ── TOAST ───────────────────────────────────────────────── */
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.remove('hidden');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.add('hidden'),2600);
}
</script>

<script id="logo-injector">
(function(){
  var t="/logo-teal.png", w="/logo-white.png";
  document.querySelectorAll(".logo-teal").forEach(function(el){el.src=t;});
  document.querySelectorAll(".logo-white").forEach(function(el){el.src=w;});
})();
</script></body>
